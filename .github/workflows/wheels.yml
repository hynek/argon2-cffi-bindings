---
name: Wheels

on:
  push:
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 4 15 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}


jobs:
  wheels:
    name: Building for ${{ matrix.os }}${{ matrix.name_suffix || '' }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
          - os: windows-2022
          - os: windows-11-arm
          - os: macOS-14
          - os: ubuntu-24.04-riscv
            cibw_archs: riscv64
            name_suffix: -riscv64

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
        if: matrix.cibw_archs != 'riscv64'
        with:
          enable-cache: false

      # Use the GitHub Action for all platforms except riscv64
      - uses: pypa/cibuildwheel@ee02a1537ce3071a004a6b08c41e72f0fdc42d9a # v3.4.0
        if: matrix.cibw_archs != 'riscv64'
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs || 'auto' }}

      # On riscv64 native runners, run cibuildwheel via uvx to avoid
      # the GitHub Action's setup-python call (not available for riscv64)
      - uses: hynek/setup-cached-uv@4300ec2180bc77d705e626a34e381b81a4772c51 # v2.5.0
        if: matrix.cibw_archs == 'riscv64'
        with:
          cache-suffix: -riscv64

      - name: Build wheels (riscv64 native)
        if: matrix.cibw_archs == 'riscv64'
        run: uvx --python 3.14 cibuildwheel --output-dir wheelhouse
        env:
          CIBW_ARCHS: riscv64

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: wheels-${{ matrix.os }}${{ matrix.name_suffix || '' }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl
...
