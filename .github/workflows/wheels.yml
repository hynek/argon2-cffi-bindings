---
name: Wheels

on:
  push:
    tags:
      - "*"
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "30 4 15 * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions: {}


jobs:
  wheels:
    name: Building for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
          - os: ubuntu-22.04-arm
          - os: windows-2022
          - os: windows-11-arm
          - os: macOS-14
          - os: ubuntu-24.04-riscv

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          submodules: recursive
          fetch-depth: 0
          fetch-tags: true
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: "false"

      # Use the GitHub Action for all platforms except riscv64
      - name: Build wheels on ${{ matrix.os }}
        uses: pypa/cibuildwheel@f03ac7617d6cff873ccf24cc0d567ef5ba5a9e6d # v4.0.0
        if: ${{ !endsWith(matrix.os, 'riscv') }}
        env:
          CIBW_ARCHS: auto

      - name: Build wheels on ${{ matrix.os }}
        run: uvx --python 3.14 cibuildwheel --output-dir wheelhouse
        if: ${{ endsWith(matrix.os, 'riscv') }}
        env:
          CIBW_ARCHS: riscv64

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  pypi-publish:
    if: |
      github.event.repository.fork == false
      && github.event_name == 'push'
      && startsWith(github.ref, 'refs/tags')
    needs: wheels
    runs-on: ubuntu-latest
    name: Upload release to PyPI
    environment:
      name: release-pypi
      url: https://pypi.org/p/argon2-cffi-bindings
    permissions:
      id-token: write  # necessary for trusted publishing
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - name: List files
        run: ls -la dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
